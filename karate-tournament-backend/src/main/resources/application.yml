server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: karate-tournament-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/karate_tournament?options=-c%20TimeZone=UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:4173}
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
    jwt:
      secret: ${JWT_SECRET:CBf7IGa+43KOJJXeFgHmJSsViLuSWFwao9E8j+0WAtw5KGVRSb+t+tnt3u3yU/o2cGLxcYAt44el2QxW/5gWLA==}
      expires-minutes: ${JWT_EXPIRES_MINUTES:480}
    seed-admin:
      email: ${SEED_ADMIN_EMAIL:admin@karate-ops.local}
      password: ${SEED_ADMIN_PASSWORD:Admin@123456}
      display-name: ${SEED_ADMIN_DISPLAY_NAME:Global Admin}
